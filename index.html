    body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0C0804;
        background-image:
            radial-gradient(ellipse at 50% 20%, rgba(90, 60, 15, 0.18) 0%, transparent 55%),
            radial-gradient(ellipse at 50% 70%, rgba(50, 30, 8, 0.15) 0%, transparent 50%),
            radial-gradient(circle at 50% 50%, rgba(30, 18, 5, 0.3) 0%, #0C0804 70%);
        padding: 32px 20px;
        font-family: 'Orbitron', monospace;
        overflow-x: hidden;
    }

    .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 40px;
        max-width: 480px;
        width: 100%;
    }

    /* Logo/Imagem */
    .logo-space {
        width: 100%;
        max-width: 420px;
    }

    .logo-space img {
        width: 100%;
        height: auto;
        display: block;
    }

    /* Botão preto com texto dourado metalizado */
    .cta-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        max-width: 420px;
        padding: 22px 32px;
        background: #0A0806;
        border: 1px solid rgba(180, 140, 60, 0.35);
        border-radius: 0;
        cursor: pointer;
        text-decoration: none;
        font-family: 'Orbitron', monospace;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        text-align: center;
        line-height: 1.4;
        color: #C8A35A;
        background-image: linear-gradient(135deg, #8A6A2A, #B8943A, #E8D08A, #D4B05A, #8A6A2A);
        background-size: 300% auto;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        position: relative;
        transition: all 0.4s ease;
        animation: goldShimmer 4s ease-in-out infinite;
    }

    .cta-btn::before {
        content: '';
        position: absolute;
        inset: 0;
        background: #0A0806;
        z-index: -1;
    }

    .cta-btn::after {
        content: '';
        position: absolute;
        inset: -1px;
        background: linear-gradient(
            135deg,
            rgba(138, 106, 42, 0.3),
            rgba(200, 163, 90, 0.15),
            rgba(232, 208, 138, 0.25),
            rgba(200, 163, 90, 0.15),
            rgba(138, 106, 42, 0.3)
        );
        z-index: -2;
    }

    .cta-btn:hover {
        transform: translateY(-2px);
        border-color: rgba(200, 163, 90, 0.6);
        box-shadow:
            0 4px 24px rgba(180, 140, 60, 0.12),
            0 0 48px rgba(180, 140, 60, 0.06);
    }

    .cta-btn:active {
        transform: translateY(0);
    }

    @keyframes goldShimmer {
        0%, 100% { background-position: 0% center; }
        50% { background-position: 300% center; }
    }

    @media (max-width: 480px) {
        body {
            padding: 24px 16px;
        }

        .container {
            gap: 32px;
        }

        .logo-space {
            max-width: 360px;
        }

        .cta-btn {
            max-width: 360px;
            padding: 20px 24px;
            font-size: 11px;
            letter-spacing: 2px;
        }
    }
</style>
