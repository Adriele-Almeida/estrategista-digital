<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Estrategista Digital Letal</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;min-height:100vh;background-color:#1A120A}body{display:flex;flex-direction:column;align-items:center;justify-content:center;background-color:#1A120A;background-image:radial-gradient(ellipse at 50% 30%,rgba(100,70,20,0.2) 0%,transparent 60%),radial-gradient(ellipse at 50% 80%,rgba(60,40,10,0.15) 0%,transparent 50%);padding:40px 20px;font-family:'Orbitron',monospace;overflow-x:hidden}.container{display:flex;flex-direction:column;align-items:center;gap:40px;max-width:480px;width:100%}.logo-space{width:100%;max-width:420px}.logo-space img{width:100%;height:auto;display:block}.cta-btn{display:flex;align-items:center;justify-content:center;width:100%;max-width:420px;padding:22px 32px;background:#0A0806;border:1px solid rgba(180,140,60,0.4);cursor:pointer;text-decoration:none;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;text-align:center;line-height:1.4;color:#C8A35A;position:relative;transition:all 0.4s ease}.cta-btn span{background-image:linear-gradient(135deg,#8A6A2A,#B8943A,#E8D08A,#D4B05A,#8A6A2A);background-size:300% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:goldShimmer 4s ease-in-out infinite}.cta-btn:hover{transform:translateY(-2px);border-color:rgba(200,163,90,0.7);box-shadow:0 4px 24px rgba(180,140,60,0.15)}@keyframes goldShimmer{0%,100%{background-position:0% center}50%{background-position:300% center}}@media(max-width:480px){body{padding:24px 16px}.container{gap:32px}.logo-space{max-width:360px}.cta-btn{max-width:360px;padding:20px 24px;font-size:11px;letter-spacing:2px}}</style></head><body><div class="container"><div class="logo-space"><img src="logo.png" alt="Estrategista Digital Letal"></div><a href="https://pay.kiwify.com.br/NfMcfXc" class="cta-btn" target="_blank"><span>Acesse o Estrategista Agora</span></a></div></body></html>
